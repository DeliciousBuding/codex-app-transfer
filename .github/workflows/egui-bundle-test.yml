name: egui-bundle-test

# v3.0.0 (egui) 三平台打包验证 workflow.
#
# 触发方式: 仅 workflow_dispatch — 用户在 GitHub UI 或 `gh workflow run
# egui-bundle-test.yml` 手动跑. **不**绑 push / pr / tag, 避免每次 PR push
# 都浪费 macOS / Windows runner 分钟数.
#
# 用途:
# - W7.3 验证 Windows NSIS 安装器能正确产出 + 注册 cas:// scheme
# - W7.4 验证 Linux .deb / .AppImage 能正确产出 + .desktop x-scheme-handler
# - W6-A 三平台 cas:// 注册流程手测的输入(下载 artifact 装一份测)
#
# **不**做任何签名 (codesign / notarize / Authenticode) — 仅 adhoc / unsigned,
# 真正的 release 走 release.yml (W7.5 整合时改). 这个 workflow 是 PR 阶段的
# packaging 烟测.
#
# W8 cutover 时会把这个 workflow 的 build 步骤搬到 release.yml,本文件可删.

on:
  workflow_dispatch:
    inputs:
      verbose:
        description: 'cargo-packager verbose 输出 (用于 debug)'
        type: boolean
        default: false

concurrency:
  group: egui-bundle-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle:
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS arm64 .app + .dmg
            formats: app dmg
          - os: ubuntu-22.04
            label: Linux x86_64 .deb + .AppImage
            formats: deb appimage
          - os: windows-latest
            label: Windows x86_64 .exe (NSIS)
            formats: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
          key: egui-bundle-${{ matrix.os }}

      # Linux GUI sysdeps — desktop_app 走 tray-icon/muda/eframe 都依赖
      - name: Install Linux GUI sysdeps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libxdo-dev \
            librsvg2-dev \
            libssl-dev

      # cargo-packager 0.11.8 — 锁版避免上游 breaking 引到本流程
      - name: Install cargo-packager
        run: cargo install cargo-packager --locked --version 0.11.8

      - name: Build desktop_app (release)
        run: cargo build -p codex-app-transfer-desktop-app --release

      - name: cargo packager
        working-directory: crates/desktop_app
        run: |
          if [ "${{ inputs.verbose }}" = "true" ]; then
            cargo packager --release -v -f ${{ matrix.formats }}
          else
            cargo packager --release -f ${{ matrix.formats }}
          fi
        shell: bash

      - name: List bundle outputs
        run: |
          ls -la target/release/ | grep -iE "\.(app|dmg|exe|msi|deb|AppImage)$" || true
          du -sh target/release/*.app target/release/*.dmg target/release/*Setup.exe target/release/*.deb target/release/*.AppImage 2>/dev/null || true
        shell: bash

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: egui-${{ matrix.os }}
          path: |
            target/release/*.app
            target/release/*.dmg
            target/release/*Setup.exe
            target/release/*.msi
            target/release/*.deb
            target/release/*.AppImage
          if-no-files-found: warn
          retention-days: 14
