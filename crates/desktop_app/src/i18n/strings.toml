zh = '需要已安装 <strong>OpenAI Codex CLI 0.126+</strong>。终端跑 <code>codex --version</code> 看版本号;没装的话先去 <a href="https://github.com/openai/codex" target="_blank" rel="noreferrer">github.com/openai/codex</a>。'
en = 'You need <strong>OpenAI Codex CLI 0.126+</strong>. Run <code>codex --version</code> in a terminal. Not installed yet? Get it at <a href="https://github.com/openai/codex" target="_blank" rel="noreferrer">github.com/openai/codex</a>.'

