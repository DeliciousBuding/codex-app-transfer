["guide.start"]
zh = '添加你的第一个提供商'
en = 'Start'

["guide.step1"]
zh = '添加提供商'
en = 'Add a Provider'

["guide.step1Link"]
zh = '去添加 →'
en = 'Add →'

["guide.step1Text"]
zh = '在「提供商」页右上角「+」选预设(Kimi / Kimi Code / DeepSeek / 智谱 GLM / 阿里云百炼 / Xiaomi MiMo),粘贴 API Key。模型映射按官方文档已预填。'
en = 'On the Providers page, click the top-right "+" and pick a preset (Kimi / Kimi Code / DeepSeek / Zhipu GLM / Alibaba Bailian / Xiaomi MiMo). Paste the API key. Model mapping is pre-filled per official docs.'

["guide.step2"]
zh = '设为默认'
en = 'Apply Once'

["guide.step2Link"]
zh = '去管理 →'
en = 'Manage →'

["guide.step2Text"]
zh = '「提供商」列表点你要用的那个,确认带上「默认」标记。可以同时保存多个,以后随时切。'
en = 'Click Generate Codex CLI config. This app generates the environment variable commands.'

["guide.step3"]
zh = '应用配置(自动)'
en = 'Set environment variables'

["guide.step3Text"]
zh = '应用启动时自动写入 <code>~/.codex/config.toml</code> 与 <code>auth.json</code>,按需启动本地转发服务。<strong>第一次会先快照备份你原来的 ~/.codex 配置</strong>,退出时按 key 智能合并还原。'
en = 'After restart, ask as usual. This app forwards messages to the active provider.'

["guide.step4"]
zh = '在终端跑 codex'
en = 'Start using Codex CLI'

["guide.step4Text"]
zh = '<strong>打开新终端</strong>,直接跑 <code>codex</code>。模型选单会显示当前 provider 的映射(Sonnet / Haiku / Opus 对应真实模型)。'
en = 'Select 3P mode after restart.'

["guide.step5"]
zh = '切换 / 退出'
en = 'Switch / Exit'

["guide.step5Text"]
zh = '右键系统托盘图标可以一键切换 provider。退出应用时,<code>~/.codex/</code> 自动回到你原来的配置 —— 不开应用 = 用你自己的原配置。'
en = 'Right-click the system tray icon to switch provider in one click. When you exit the app, <code>~/.codex/</code> reverts to your original config — app off = your own config back.'

["guide.subtitle"]
zh = '让 OpenAI Codex CLI 接入 Kimi、DeepSeek、智谱 GLM、阿里云百炼、Xiaomi MiMo 等供应商,无需改动 CLI 本身。'
en = 'Make OpenAI Codex CLI work with Kimi, DeepSeek, Zhipu GLM, Alibaba Bailian, Xiaomi MiMo and other providers — no changes to the CLI itself.'

["guide.title"]
zh = '使用引导'
en = 'Getting Started'

["guide.troubleshootTitle"]
zh = '遇到问题'
en = 'Troubleshooting'

["guide.tsFeedbackText"]
zh = 'Dashboard 顶栏「反馈」按钮匿名提交问题描述 + 截图 + 日志,默认附诊断信息(应用版本 / OS / 当前 provider 名,<strong>不含 API Key</strong>)。无需登录。'
en = 'The "Feedback" button on the Dashboard top bar lets you submit a description + screenshots + logs anonymously. Diagnostics (app version / OS / current provider name — <strong>no API keys</strong>) are attached by default. No login required.'

["guide.tsFeedbackTitle"]
zh = '提交反馈'
en = 'Submit Feedback'

["guide.tsLogsText"]
zh = 'Settings 页底部「查看日志」按钮直接打开 <code>~/.codex-app-transfer/logs/</code>。或在「转发」页内置实时日志面板,2 秒自动刷新。'
en = 'On Settings, "View Logs" opens <code>~/.codex-app-transfer/logs/</code>. The Forwarding page also has an inline log panel that refreshes every 2 seconds.'

["guide.tsLogsTitle"]
zh = '查看日志'
en = 'View Logs'

["guide.tsRestartText"]
zh = 'Codex CLI 只在启动时读 <code>~/.codex/</code> 配置。切换 provider 后必须 <strong>关闭并重新打开终端</strong>,新终端才会用新映射。'
en = 'Codex CLI only reads <code>~/.codex/</code> at startup. After switching providers, you must <strong>close and reopen the terminal</strong> for the new mapping to take effect.'

["guide.tsRestartTitle"]
zh = '模型菜单不刷新?'
en = 'Model Picker Not Refreshing?'

["guide.tsSpeedText"]
zh = '如果测速失败,可能是默认选择了 <strong>responses</strong> 协议。编辑该 provider,将 API 协议切到 <strong>chat/completions</strong> 后重新测试。Kimi / DeepSeek / 智谱 / 百炼 / Xiaomi MiMo 官方接口都用 chat/completions。'
en = 'If the speed test fails, the provider may default to the <strong>responses</strong> protocol. Edit it and switch the API protocol to <strong>chat/completions</strong>, then retry. Kimi / DeepSeek / Zhipu / Bailian / Xiaomi MiMo all expose chat/completions officially.'

["guide.tsSpeedTitle"]
zh = '测速 / 兼容性失败?'
en = 'Speed / Compatibility Test Failing?'

