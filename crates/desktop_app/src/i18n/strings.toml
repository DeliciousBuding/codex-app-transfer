["guide.advRestoreText"]
zh = 'Dashboard 顶栏红色按钮按 key 智能合并 —— 仅回滚我们写过的 auth_mode / OPENAI_API_KEY / openai_base_url,你的 model_reasoning_effort 等其他配置原样保留。'
en = 'The red button on the Dashboard top bar performs a key-level smart merge — only rolls back fields we wrote (auth_mode / OPENAI_API_KEY / openai_base_url). Your model_reasoning_effort and other settings stay intact.'

